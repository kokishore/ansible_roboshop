- name: Configuring the catalogue server 
  hosts: catalogue
  become: yes
  tasks:
  - name: disabling the default nodejs 
    ansible.builtin.command: dnf module disable nodejs -y

  - name: Enabling the NodeJS 20 version 
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: Installing nodejs
    ansible.buitin.dnf:
      name: nodejs
      state: present

  - name: creating app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: creating roboshop system user 
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin
      system: true
      home: /app

  - name: Downloading the catalogue code 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip


  # this module thinks file exist on ansible control server, needs to extract on to remote machine
  # remote_src: yes means files already exist in catalogue server

  - name: Extract the code 
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: Install dependencies
    community.general.npm:
      path: /app

  - name: copying the catalogue service file to system directory
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: systemctl daemon reload service 
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Enable and start ther service
    ansible.builtin.service:
      name: catalogue
      state: started 
      enabled: yes

  - name: copying the mongodb repo 
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: Installing mongodb client
    ansible.buitin.dnf:
      name: mongodb-mongosh
      state: present

  - name: checking produts loaded or not
    ansible.builtin.command: mongosh --host mongodb.kaws84s.site --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output


  - name: printing the catalogue output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: Loading the products 
    ansible.builtin.shell: mongosh --host mongodb.kaws84s.site < /app/db/master-data.js
    when: catalogue_output.stdout | int < 0

